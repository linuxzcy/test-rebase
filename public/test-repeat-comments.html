<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>重复评论测试 - 纯 JS 演示</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }

    h1 {
      color: #2c3e50;
    }

    .container {
      display: grid;
      grid-template-columns: 1fr 350px;
      gap: 20px;
    }

    .editor {
      border: 1px solid #ddd;
      padding: 15px;
      min-height: 300px;
      background: white;
      border-radius: 4px;
      line-height: 1.6;
      font-size: 16px;
    }

    .editor:focus {
      outline: none;
      border-color: #007bff;
    }

    .comment-highlight {
      cursor: pointer;
      padding: 2px 0;
      transition: filter 0.2s;
    }

    .comment-highlight:hover {
      filter: brightness(0.85) !important;
    }

    .comments-panel {
      background: #f8f9fa;
      border: 1px solid #ddd;
      padding: 15px;
      border-radius: 4px;
      max-height: 500px;
      overflow-y: auto;
    }

    .comment-item {
      background: white;
      border: 1px solid #e0e0e0;
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 4px;
    }

    .comment-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 12px;
      color: #666;
    }

    .comment-text {
      background: #f0f0f0;
      padding: 6px 10px;
      border-radius: 3px;
      font-size: 13px;
      margin-bottom: 8px;
      font-style: italic;
    }

    .comment-content {
      margin-bottom: 8px;
    }

    button {
      padding: 6px 12px;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      font-size: 12px;
    }

    .delete-btn {
      background: #dc3545;
      color: white;
    }

    .delete-btn:hover {
      background: #c82333;
    }

    .instructions {
      background: #fff3cd;
      border-left: 4px solid #ffc107;
      padding: 15px;
      margin-bottom: 20px;
      border-radius: 4px;
    }

    .instructions h3 {
      margin-top: 0;
      color: #856404;
    }

    .instructions ol {
      margin: 10px 0 0 20px;
    }

    .instructions li {
      margin: 5px 0;
    }
  </style>
</head>
<body>
  <h1>重复评论测试 - 纯 JS 演示</h1>

  <div class="instructions">
    <h3>测试步骤：</h3>
    <ol>
      <li>选中文本 "测试文本" 并输入评论（会显示黄色高亮）</li>
      <li>再次选中相同的 "测试文本" 并输入评论（会叠加蓝色高亮）</li>
      <li>再次选中相同的 "测试文本" 并输入评论（会叠加绿色高亮）</li>
      <li>删除第二个评论，观察蓝色高亮被移除，黄色和绿色保留</li>
      <li>删除第一个评论，观察黄色高亮被移除，绿色保留</li>
    </ol>
  </div>

  <div class="container">
    <div>
      <div id="editor" class="editor" contenteditable="true">
        这是一段测试文本。你可以选中任意文本添加评论。尝试多次选中相同的文本，观察重复评论的处理效果。测试文本可以被多次评论，删除某个评论时不会影响其他评论的高亮。
      </div>
    </div>

    <div class="comments-panel">
      <h3>评论列表 (<span id="comment-count">0</span>)</h3>
      <div id="comments-list"></div>
    </div>
  </div>

  <script>
    const colors = [
      '#fff3cd', '#d1ecf1', '#d4edda', '#f8d7da', '#e2e3e5',
      '#cfe2ff', '#f5c2c7', '#cff4fc', '#d3d3d4', '#ffeaa7'
    ]

    let comments = []
    let currentRange = null
    let selectedText = ''

    const editor = document.getElementById('editor')
    const commentsList = document.getElementById('comments-list')
    const commentCount = document.getElementById('comment-count')

    // 监听文本选择
    editor.addEventListener('mouseup', () => {
      const selection = window.getSelection()
      const text = selection.toString().trim()

      if (text.length === 0) return

      const range = selection.getRangeAt(0)
      if (!editor.contains(range.commonAncestorContainer)) return

      selectedText = text
      currentRange = range.cloneRange()

      // 简化版：直接 prompt 输入评论
      const commentText = prompt(`为 "${text}" 添加评论：`)
      if (commentText && commentText.trim()) {
        addComment(commentText)
      }
    })

    function addComment(content) {
      const commentId = `comment-${Date.now()}`
      const color = colors[comments.length % colors.length]

      const comment = {
        id: commentId,
        content: content,
        selectedText: selectedText,
        color: color,
        time: new Date().toLocaleString('zh-CN')
      }

      comments.push(comment)
      highlightText(comment, currentRange)
      renderComments()

      currentRange = null
      selectedText = ''
    }

    function highlightText(comment, range) {
      try {
        const span = document.createElement('span')
        span.className = 'comment-highlight'
        span.setAttribute('data-comment-id', comment.id)
        span.setAttribute('title', `评论: ${comment.content}`)
        span.style.backgroundColor = comment.color
        span.style.borderBottom = `2px solid ${comment.color}`
        span.style.filter = 'brightness(0.9)'

        try {
          range.surroundContents(span)
        } catch (e) {
          const contents = range.extractContents()
          span.appendChild(contents)
          range.insertNode(span)
        }

        window.getSelection()?.removeAllRanges()
      } catch (err) {
        console.error('高亮文本失败:', err)
      }
    }

    function deleteComment(commentId) {
      // 从数组中删除
      const index = comments.findIndex(c => c.id === commentId)
      if (index !== -1) {
        comments.splice(index, 1)
      }

      // 从 DOM 中删除高亮
      const highlightElements = Array.from(
        editor.querySelectorAll(`[data-comment-id="${commentId}"]`)
      )

      highlightElements.forEach(element => {
        const parent = element.parentNode
        if (!parent) return

        const fragment = document.createDocumentFragment()
        while (element.firstChild) {
          fragment.appendChild(element.firstChild)
        }

        parent.replaceChild(fragment, element)
      })

      editor.normalize()
      renderComments()
    }

    function renderComments() {
      commentCount.textContent = comments.length

      if (comments.length === 0) {
        commentsList.innerHTML = '<div style="text-align: center; color: #999; padding: 20px;">暂无评论</div>'
        return
      }

      commentsList.innerHTML = comments.map((comment, index) => `
        <div class="comment-item">
          <div class="comment-header">
            <span><strong>评论 ${index + 1}</strong></span>
            <span>${comment.time}</span>
          </div>
          <div class="comment-text">"${comment.selectedText}"</div>
          <div class="comment-content">${comment.content}</div>
          <button class="delete-btn" onclick="deleteComment('${comment.id}')">删除</button>
        </div>
      `).join('')
    }

    // 初始化
    renderComments()
  </script>
</body>
</html>
